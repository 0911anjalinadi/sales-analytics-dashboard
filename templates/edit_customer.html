<!DOCTYPE html>
<html>
<head>
    <title>Edit Customer</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h2>✏️ Edit Customer</h2>

        <form action="/update_customer/{{ customer[0] }}"
              method="POST">

            <input
                type="text"
                name="customer_name"
                value="{{ customer[1] }}"
                required
            >

            <input
                type="text"
                name="city"
                value="{{ customer[2] }}"
                required
            >

            <button type="submit">
                Update Customer
            </button>

        </form>

    </div>

</div>

</body>
</html>
